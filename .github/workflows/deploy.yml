# ================================================================
# AWS ECS Blue/Green Deployment via CodeDeploy
# ================================================================
#
# DEPLOYMENT MODEL: Blue/Green via AWS CodeDeploy (ECS)
#
# Flow:
#   1. Build Docker image → Push to ECR
#   2. Register new ECS Task Definition revision
#   3. Generate appspec.json with real Task Definition ARN
#   4. Trigger CodeDeploy deployment
#   5. CodeDeploy spins up Green task set behind secondary TG
#   6. ALB traffic atomically cuts over to Green
#   7. Blue (old) task set drains and terminates
#
# This eliminates Next.js ChunkLoadError split-brain caching
# because traffic NEVER hits a mix of old and new containers.
# ================================================================

name: Deploy to AWS ECS (Blue/Green)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: aurumshield-app
  ECS_CLUSTER: aurumshield-cluster
  ECS_SERVICE: aurumshield-app
  CONTAINER_NAME: aurumshield-app
  CODEDEPLOY_APPLICATION: aurumshield-bluegreen
  CODEDEPLOY_DEPLOYMENT_GROUP: aurumshield-bluegreen-dg

jobs:
  deploy:
    name: Build and Deploy (Blue/Green)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Generate .env.production ──
      # NEXT_PUBLIC_* vars are inlined into the JS bundle at build time.
      # Server-side secrets are read by the standalone Next.js server at runtime.
      - name: Generate .env.production for build
        run: |
          cat <<'EOF' > .env.production
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_Y2hhcm1pbmctbWFsYW11dGUtMTAuY2xlcmsuYWNjb3VudHMuZGV2JA
          CLERK_SECRET_KEY=sk_test_fIaeGptebLHqvIUT1dAOykEwDyJ39v3hEdAF3TbyEw
          NEXT_PUBLIC_CLERK_SIGN_IN_URL=/login
          NEXT_PUBLIC_CLERK_SIGN_UP_URL=/signup
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/platform
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/platform
          NEXT_PUBLIC_GOLD_API_KEY=goldapi-61jz17mmw26w54-io
          COLUMN_API_KEY=test_3Ad1cbp6TlIC01ehxs7CjaBKkFE
          IDENFY_API_KEY=20SqdSWzbbr
          IDENFY_API_SECRET=EgFxjFB7e2GoYEjGDkPR
          IDENFY_WEBHOOK_SECRET=a7f9b2d8e4c13a5f7d6e8b9a0c1f2e3d4c5b6a7f8e9d0c1b2a3f4e5d6c7b8a9f
          ACTIVE_COMPLIANCE_PROVIDER=KYCAID
          KYCAID_ENV=production
          KYCAID_TEST_API_KEY=e1d499bb0a4df34efd280ad775aa007cf023
          KYCAID_PRODUCTION_API_KEY=475161a70241e344202a31d7bd523f34b131
          KYCAID_FORM_ID_KYC=d795f1fe0579334acb294b1717e76fa84f34
          KYCAID_FORM_ID_KYB=281dfe730a6a63449c290a176800fc01bc38
          KYCAID_CALLBACK_URL=https://app.aurumshield.vip/api/webhooks/kycaid
          NEXT_PUBLIC_FINGERPRINT_API_KEY=v2Sh4oHVmFlGimLgPvBQ
          FINGERPRINT_SERVER_SECRET=MmnemLbDTTEXwGcNPm77
          OPENSANCTIONS_API_KEY=2a94836d5cb76ee97090537870534a3d
          DROPBOX_SIGN_API_KEY=2607baf9662cd53294b4120ddf2c7b8a6b873173c31b0e301757196a7b297350
          MOOV_PUBLIC_KEY=U3niHalxKwJxGzAL
          MOOV_SECRET_KEY=GVfH8VJgqplJ8CUYx3UgUF7Timk1wE97
          SETTLEMENT_RAIL=auto
          SETTLEMENT_ENTERPRISE_THRESHOLD=25000000
          FRACTEL_PHONE_NUMBER=+12402400470
          MOOV_WEBHOOK_SECRET=8371f0726e84ee53cc7b51690ef7aef0b43eefa2fca6e615d70341cee6801e4a8411488cf774e6df97159c2e936528bea7bca7af3e3eb60a7fb3161e1a81d23e
          CLERK_WEBHOOK_SECRET=whsec_g+fl2HQVo6IHIqStnUEdZl4b1nd8mMmC
          COLUMN_WEBHOOK_SECRET=SET_FROM_COLUMN_DASHBOARD
          NEXT_PUBLIC_ROOT_URL=https://aurumshield.vip
          NEXT_PUBLIC_APP_URL=https://app.aurumshield.vip
          VERIFF_API_KEY=7961d64f-7253-40dc-aa2c-d2ab23f80892
          VERIFF_API_SECRET=9b946a72-96cd-4240-8623-a0465ad24fd8
          AWS_REGION=us-east-2
          TURNKEY_ORGANIZATION_ID=4f9a8a9f-9f90-454b-906d-05d47549e5db
          TURNKEY_API_PUBLIC_KEY=03571a20bbad27d8ce14c552e8ec0b01105c042925e70704945433d38adfc2e7e1
          TURNKEY_API_PRIVATE_KEY=fff80852f8e631c4efc4c566fbcd1870106f53e152e96da24688fda1439918a0
          NEXT_PUBLIC_VAPI_PUBLIC_KEY=bafbcec8-96b4-48d0-8ea0-6c8ce48d3ac4
          NEXT_PUBLIC_VAPI_ASSISTANT_ID=0056b7ad-31f1-45dd-b88b-1d29bc97efc6
          NEXT_PUBLIC_DEMO_MODE=true
          EOF
          sed -i 's/^          //' .env.production

      # ── AWS Authentication ──
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Clear stale Docker Hub credentials ──
      # The buildx action pulls moby/buildkit from Docker Hub.
      # Stale Docker Hub creds (from runner cache) cause "unauthorized" errors.
      # Logging out forces an anonymous pull, which works for public images.
      - name: Logout from Docker Hub
        run: docker logout || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --build-arg CACHEBUST=${{ github.sha }} \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            .
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── Register New Task Definition ──
      - name: Register new ECS task definition revision
        id: register-task-def
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $CONTAINER_NAME \
            --region $AWS_REGION \
            --query 'taskDefinition' \
            --output json)

          NEW_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Deploying image: $NEW_IMAGE"

          NEW_TASK_DEF=$(echo "$TASK_DEF" | \
            jq --arg IMAGE "$NEW_IMAGE" --arg NAME "$CONTAINER_NAME" \
             '.containerDefinitions |= map(if .name == $NAME then .image = $IMAGE else . end) |
              del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) |
              del(.containerDefinitions[].healthCheck)')

          NEW_REVISION=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --region $AWS_REGION \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Registered new task definition: $NEW_REVISION"
          echo "task-def-arn=$NEW_REVISION" >> $GITHUB_OUTPUT

      # ── Generate Runtime AppSpec ──
      # Injects the real task definition ARN and network config
      # into the appspec template for CodeDeploy consumption.
      - name: Generate appspec.json with real task definition
        id: generate-appspec
        run: |
          TASK_DEF_ARN="${{ steps.register-task-def.outputs.task-def-arn }}"

          # Pull network config from the live ECS service
          SERVICE_DESC=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION \
            --query 'services[0].networkConfiguration.awsvpcConfiguration' \
            --output json)

          SUBNETS=$(echo "$SERVICE_DESC" | jq -c '.subnets')
          SECURITY_GROUPS=$(echo "$SERVICE_DESC" | jq -c '.securityGroups')
          ASSIGN_PUBLIC_IP=$(echo "$SERVICE_DESC" | jq -r '.assignPublicIp')

          cat <<SPEC > appspec-runtime.json
          {
            "version": 1,
            "Resources": [
              {
                "TargetService": {
                  "Type": "AWS::ECS::Service",
                  "Properties": {
                    "TaskDefinition": "$TASK_DEF_ARN",
                    "LoadBalancerInfo": {
                      "ContainerName": "$CONTAINER_NAME",
                      "ContainerPort": 3000
                    },
                    "PlatformVersion": "LATEST",
                    "NetworkConfiguration": {
                      "AwsvpcConfiguration": {
                        "Subnets": $SUBNETS,
                        "SecurityGroups": $SECURITY_GROUPS,
                        "AssignPublicIp": "$ASSIGN_PUBLIC_IP"
                      }
                    }
                  }
                }
              }
            ]
          }
          SPEC
          sed -i 's/^          //' appspec-runtime.json

          echo "Generated appspec-runtime.json:"
          cat appspec-runtime.json

      # ── Trigger CodeDeploy Blue/Green Deployment ──
      - name: Create CodeDeploy deployment
        id: codedeploy
        run: |
          # Build revision JSON safely using jq — no shell escaping
          APPSPEC_CONTENT=$(cat appspec-runtime.json | jq -c '.' | jq -Rs '.')

          jq -n \
            --arg content "$(cat appspec-runtime.json | jq -c '.')" \
            '{
              revisionType: "AppSpecContent",
              appSpecContent: { content: $content }
            }' > revision.json

          echo "Revision payload:"
          cat revision.json

          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name $CODEDEPLOY_APPLICATION \
            --deployment-group-name $CODEDEPLOY_DEPLOYMENT_GROUP \
            --revision file://revision.json \
            --region $AWS_REGION \
            --query 'deploymentId' \
            --output text)

          echo "CodeDeploy deployment triggered: $DEPLOYMENT_ID"
          echo "deployment-id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

      # ── Wait for Blue/Green Cutover ──
      # Timeout: 30 minutes (container startup ~2min + ALB health check convergence)
      - name: Wait for CodeDeploy deployment to complete
        run: |
          DEPLOYMENT_ID="${{ steps.codedeploy.outputs.deployment-id }}"
          echo "Waiting for deployment $DEPLOYMENT_ID to complete (up to 30 minutes)..."

          MAX_ATTEMPTS=120
          POLL_INTERVAL=15
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(aws deploy get-deployment \
              --deployment-id $DEPLOYMENT_ID \
              --region $AWS_REGION \
              --query 'deploymentInfo.status' \
              --output text)

            echo "Poll $i/$MAX_ATTEMPTS: status=$STATUS"

            case $STATUS in
              Succeeded)
                echo "✅ Blue/Green deployment complete — traffic atomically cut to Green."
                exit 0
                ;;
              Failed|Stopped)
                echo "❌ Deployment $STATUS."
                aws deploy get-deployment \
                  --deployment-id $DEPLOYMENT_ID \
                  --region $AWS_REGION \
                  --query 'deploymentInfo.errorInformation' \
                  --output json
                exit 1
                ;;
              *)
                # InProgress, Created, Queued, Ready — keep waiting
                ;;
            esac

            sleep $POLL_INTERVAL
          done

          echo "❌ Deployment did not complete within $(( MAX_ATTEMPTS * POLL_INTERVAL / 60 )) minutes"
          exit 1
